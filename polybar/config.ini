[global/wm]
include-file = ~/.config/polybar/modules.ini

[bar/base]
background = #d93d3c3b
foreground = #b6a49b
width = 95%
height = 50
radius = 15
line-size = 0
border-bottom-size = 0
padding-left = 0
padding-right = 0

fixed-center = true
dpi = 192

font-0 = Monospace:size=12;1
font-1 = "Font Awesome 5 Free:style 5 Free:pixelsize=12;1"
font-2 = "Font Awesome 5 Free:style=Solid:pixelsize=12;1"

tray-position = none
tray-maxsize = 24
tray-detached = false
tray-transparent = false
tray-padding = 2
tray-scale = 1.0

override-redirect = true
offset-x = 96
offset-y = 20
padding = 0

[bar/top]
inherit = bar/base
bottom = false

modules-left = cpu memory temperature
modules-center = title 
modules-right = brightness volume network
module-margin = 1

[bar/bottom]
inherit = bar/base
bottom = true

modules-left = i3
modules-center = 
modules-right = battery date

