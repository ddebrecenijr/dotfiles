[global/wm]
margin-bottom = 0
margin-top = 0

include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/modules.ini

[bar/main]
monitor = eDP1
monitor-strict = false
bottom = false
fixed-center = true
width = 100%
height = 22

offset-x = 0%
offset-y = 0%
background = ${color.bg}
foreground = ${color.bg}

radius-top = 0.0
radius-bottom = 0.0

overline-size = 2
overline-color = ${color.ac}

border-bottom-size = 0
border-color = ${color.ac}

padding = 0

module-margin-left = 0
module-margin-right = 0

font-0 = Hack:size=22;3
font-1 = "Font Awesome 5 Free:style 5 Free:style-Solid:pixelsize=24;3"
font-2 = "Font Awesome 5 Free:style=Regular:pixelsize=24;3"

[bar/top]
inherit = bar/main
modules-left = title right-end-top left-end-bottom i3 right-end-top left-end-bottom
modules-right = left-end-top updates right-end-bottom left-end-top temperature battery right-end-bottom left-end-top date sysmenu
enable-ipc = true

[bar/bottom]
inherit = bar/main
bottom = true
modules-left = mpd right-end-bottom left-end-top cpu memory filesystem right-end-bottom
modules-right = left-end-bottom network right-end-top left-end-bottom volume brightness
enable-ipc = true

[layout]
module-padding = 1
icon-font = 2
bar-format = %{T4}%fill%%indicator%%empty%%{F-}%{T-}
bar-fill-icon = -
separator = 
spacing = 0
dim-value = 1.0
tray-position = none
tray-detached = false
tray-maxsize = 16
tray-transparent = false
tray-background = ${color.bg}
tray-offset-x = 0
tray-offset-y = 0
tray-padding = 0
tray-scale = 1.0

