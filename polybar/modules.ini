[module/volume]
type = internal/alsa
format-volume = <ranmp-volume> <bar-volume>
format-volume-background = ${color.mb}
format-volume-padding = ${layout.module-padding}

format-muted = <label-muted>

label-volume = %percentage%%
format-muted-prefix = 
format-muted-background = ${color.mb}

label-muted = "Muted"
label-muted-foreground = ${color.ac}
label-muted-background = ${color.mb}
label-muted-padding = ${layout.module-padding}

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 

bar-volume-format = ${layout.bar-format}

bar-volume-foreground-0 = ${color.bn}
bar-volume-foreground-1 = ${color.bn}
bar-volume-foreground-2 = ${color.bm}
bar-volume-foreground-3 = ${color.bm}
bar-volume-foreground-4 = ${color.bd}
bar-volume-foreground-5 = ${color.bd}

bar-volume-width = 6
bar-volume-gradient = false
bar-volume-fill = ${layout.bar-fill-icon}
bar-volume-indicator = 
bar-volume-empty = ${layout.bar-fill-icon}
bar-volume-empty-foreground = ${color.be}

ramp-headphones-0 = 

[module/brightness]
type = internal/xbacklight
card = intel_backlight
format = <ramp> <bar>
format-background = ${color.mb}
format-padding = ${layout.module-padding}
label = %percentage%%

ramp-0 = 

bar-format = ${layout.bar-format}
bar-foreground-0 = ${color.bn}
bar-foreground-1 = ${color.bn}
bar-foreground-2 = ${color.bm}
bar-foreground-3 = ${color.bm}
bar-foreground-4 = ${color.bd}
bar-foreground-5 = ${color.bd}

bar-width = 6
bar-gradient = false
bar-fill = ${layout.bar-fill-icon}
bar-indicator = 
bar-empty = ${layout.bar-fill-icon}
bar-empty-foreground = ${color.be}

[module/battery]
type = internal/battery
full-at = 99
battery = BAT0
adapter = AC

poll-interval = 2
time-format = %H:%M

format-charging = <animation-charging> <label-charging>
format-charging-background = ${color.mb}
format-charging-padding = ${layout.module-padding}

format-discharging = <ramp-capacity> <label-discharging>
format-discharging-background = ${color.mb}
format-discharging-padding = ${layout.module-padding}

label-charging = %percentage%%
label-discharging = %percentage%%

label-full = Fully Charged
label-full-background = ${color.mb}
label-full-padding = ${layout.module-padding}

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 

animation-charging-framerate = 750

[module/cpu]
type = internal/cpu
interval = 0.5
format = <label>
format-prefix = " "
color-background = ${color.mb}
color-padding = ${layout.module-padding}
label = "%percentage%%"

[module/date]
type = internal/date
interval = 1.0
time =  %H:%M
time-alt =  %e %B - %A

format = <label>
format-background = ${color.mb}
format-padding = ${layout.module-padding}
label = %time%

[module/filesystem]
type = internal/fs
mount-0 = /
interval = 10
fixed-values = true
format-mounted = <label-mounted>
format-mounted-prefix = " "
format-mounted-background = ${color.mb}
format-mounted-padding = ${layout.module-padding}

label-mounted = %used%/%total%

[module/memory]
type = internal/memory
interval = 2
format = <label>
format-prefix = " "
format-background = ${color.mb}
format-padding = ${layout.module-padding}
label = "%gb_used"

[module/mpd]
type = internal/mpd
interval = 1
format-online =  <label-song> <bar-progress> <label-time>
format-online-background = ${color.mb}
format-online-padding = ${layout.module-padding}

label-song = "%title% - %artist%"
label-song-maxlen = 25
label-song-ellipsis = true

label-offline = "Offline"

icon-play = 
icon-pause = 
icon-stop = 
icon-prev = 
icon-next = 

bar-progress-format = ${layout.bar-format}

bar-progress-foreground-0 = ${color.bn}
bar-progress-foreground-1 = ${color.bn}
bar-progress-foreground-2 = ${color.bm}
bar-progress-foreground-3 = ${color.bm}
bar-progress-foreground-4 = ${color.bd}
bar-progress-foreground-5 = ${color.bd}

[module/checknetwork]
type = custom/script

exec = ~/.config/polybar/scripts/check_network.sh
tail = true
interval = 5
format-background = ${color.mb}
format-padding = ${layout.module-padding}
click-left = networkmanager_dmenu &
click-middle = networkmanager_dmenu &
click-right = networkmanager_dmenu &

[module/updates]
type = custom/script
exec = ~/.config/polybar/scripts/updates.sh
tail = true
interval = 5
format-background = ${color.mb}
format-padding = ${layout.module-padding}
click-left = ~/.config/scripts/lupdates &

[module/sysmenu]
type = custom/text
content = 
content-background = ${color.mb}
content-foreground = ${color.mf}
content-padding = ${layout.module-padding}
click-left = ~/.config/polybar/scripts/powermenu

[module/powermenu]
type = custom/menu
expand-right = true
menu-0-0 = reboot
menu-0-0-exec = menu-open-1
menu-0-1 = shutdown
menu-0-1-exec = menu-open-2
menu-1-0 = back
menu-1-0-exec = menu-open-0
menu-1-1 = reboot
menu-1-1-exec = systemctl reboot
menu-2-0 = shutdown
menu-2-0-exec = systemctl poweroff
menu-2-1 = back
menu-2-1-exec = menu-open-0

format-spacing = 1
fomrat-background = ${color.mb}
format-padding = ${layout.module-padding}

label-open = 
label-close = 
label-separator = |

label-open-foreground = ${color.mf}
label-close-foreground = ${color.mf}
label-separator-foreground = ${color.mf}

[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsnumbers = true
index-sort = true
enable-scroll = false

[module/network]
type = internal/network
interface = wlp2s0
interval = 1.0
accumulate-stats = true
unknown-as-up = true

format-connected =  label-connected>
format-connected-background = ${color.mb}
format-connected-padding = ${layout.module-padding}

format-disconnected = <label-disconnected>
format-disconnected.background = ${color.mb}
format-disconnected-padding = ${layout.module-padding}

label-connected = %essid%
label-disconnected = "Not Connected"

[module/temperature]
type = internal/temperature
interval = 0.5
units = true
format = <label>
format-background = ${color.mb}
format-padding = ${layout.module-padding}
format-warn = <label-warn>
format-warn-background = ${color.mb}
format-warn-padding = ${layout.module-padding}

label = %temperature-c%
label-warn = Ttemperature-c%
label-warn-foreground = #f00

[module/title]
type = internal/xwindow
fomrat = <label>
format-background = ${color.mb}
format-padding = %{layout.module-padding}
label = %title%
label-maxlen = 30

[module/decor-glyph]
type = custom/text
content-background = ${color.bg}
content-foreground = ${color.mgf}

[module/left-end-top]
inherit = module/decor-glyph
content = "%{T3}/%{T-}"

[module/right-end-top]
inherit = module/decor-glyph
content = "%{T3}\%{T-}"

[module/left-end-bottom]
inherit = module/decor-glyph
content = "%{T3}/{T-}"

[module/right-end-bottom]
inherit = module/decor-glyph
content = "%{T3]\{T-}"
