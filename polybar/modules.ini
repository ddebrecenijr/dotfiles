[module/volume]
type = internal/alsa

format-volume = <ramp-volume> <label-volume>
format-muted = <label-muted>

label-volume = %percentage%%
format-muted-prefix = "’Ü® "

ramp-volume-0 = ’Ć”
ramp-volume-1 = ’Ć¦
ramp-volume-2 = ’Ć©

ramp-headphones-0 = ’Ćź

[module/brightness]
type = internal/xbacklight
card = intel_backlight
format = <ramp> <bar>
format-background = ${color.mb}
format-padding = ${layout.module-padding}
label = %percentage%%

ramp-0 = ’åģ

bar-format = ${layout.bar-format}
bar-foreground-0 = ${color.bn}
bar-foreground-1 = ${color.bn}
bar-foreground-2 = ${color.bm}
bar-foreground-3 = ${color.bm}
bar-foreground-4 = ${color.bd}
bar-foreground-5 = ${color.bd}

bar-width = 6
bar-gradient = false
bar-fill = ${layout.bar-fill-icon}
bar-indicator = 
bar-empty = ${layout.bar-fill-icon}
bar-empty-foreground = ${color.be}

[module/battery]
type = internal/battery
full-at = 99
battery = BAT0
adapter = AC

poll-interval = 2
time-format = %H:%M

format-charging = <animation-charging> <label-charging>

format-discharging = <ramp-capacity> <label-discharging>

label-charging = %percentage%%
label-discharging = %percentage%%

label-full = Fully Charged

ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ

animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-3 = ’ēü
animation-charging-4 = ’ēĆ

animation-charging-framerate = 750

[module/cpu]
type = internal/cpu
interval = 0.5
format = <label>
format-prefix = "’ŗø "
label = "%percentage%%"
format-padding = 1

[module/date]
type = internal/date
interval = 1.0
time = ’ĆŚ %H:%M
date = ’ü│ %a %d %B
label = %date%  %time%

format-padding = 1

[module/memory]
type = internal/memory
interval = 2
format = <label>
format-prefix = "’öĖ "
label = "%gb_used%"
format-padding = 0

[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsnumbers = true
index-sort = true
enable-scroll = false

[module/network]
type = internal/network
interface = wlp2s0
interval = 3.0

format-connected =  <label-connected>
