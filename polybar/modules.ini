label-disconnected-foreground = #66ffffff
format-padding = 1

[module/temperature]
type = internal/temperature
interval = 0.5
units = true
format = ’Ø½ <label>
format-warn = ’Ø® <label-warn>
format-padding = 0

label = %temperature-c%
label-warn = Ttemperature-c%
